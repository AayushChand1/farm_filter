<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Farm Detect</title>
  <link rel="stylesheet" href="./styles/style.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>
<body>
  <div class="layout">
    <aside id="controls" class="panel">
      <h1>Farm Detect</h1>
      <p class="intro">Upload GeoJSON or the full set of shapefile sidecars, then filter buildings instantly in the browser.</p>

      <label class="upload-field">
        <span>Dataset</span>
        <input type="file" id="fileInput" multiple />
      </label>

      <div class="actions">
        <button id="uploadButton" type="button">Upload and Process</button>
        <label class="export-control" for="exportFormatSelect">
          <span>Export format</span>
          <select id="exportFormatSelect">
            <option value="geojson">GeoJSON</option>
            <option value="gpkg">GPKG</option>
            <option value="shapefile">Shapefile ZIP</option>
          </select>
        </label>
        <button id="exportButton" type="button">Export Filtered Data</button>
      </div>

      <p id="status" class="status">Waiting for dataset.</p>

      <section class="filter-group">
        <h2>Basemap</h2>
        <label for="basemapSelect">Layer</label>
        <select id="basemapSelect">
          <option value="osm">OpenStreetMap</option>
          <option value="satellite">Satellite</option>
        </select>
      </section>

      <section class="filter-group">
        <h2>Filters</h2>

        <label class="filter-row">
          <input type="checkbox" id="areaToggle" checked />
          <span>Minimum area</span>
        </label>
        <input type="range" id="areaSlider" min="0" max="2000" value="0" step="10" />
        <output id="areaValue" for="areaSlider">0</output>

        <label class="filter-row">
          <input type="checkbox" id="ratioToggle" checked />
          <span>Minimum ratio</span>
        </label>
        <input type="range" id="ratioSlider" min="1" max="10" value="1" step="0.1" />
        <output id="ratioValue" for="ratioSlider">1.0</output>

        <label class="filter-row">
          <input type="checkbox" id="angleToggle" />
          <span>Minimum orientation</span>
        </label>
        <input type="range" id="angleSlider" min="0" max="90" value="90" step="1" />
        <output id="angleValue" for="angleSlider">90</output>
      </section>

      <section class="summary">
        <h2>Results</h2>
        <p>Total features: <strong id="totalCount">0</strong></p>
        <p>Visible features: <strong id="visibleCount">0</strong></p>
      </section>
    </aside>

    <main class="map-shell">
      <div id="map"></div>
    </main>
  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="./config.js"></script>
  <script src="./src/map.js"></script>
  <script src="./src/render.js"></script>
  <script src="./src/filters.js"></script>
  <script src="./src/upload.js"></script>
  <script src="./src/export.js"></script>
  <script src="./src/app.js"></script>
</body>
</html>
